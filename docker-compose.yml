version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sispec
      POSTGRES_USER: sispec
      POSTGRES_PASSWORD: sispec2025
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://sispec:sispec2025@postgres:5432/sispec
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml_service:8001
    depends_on:
      - postgres
      - redis

  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ml_models:/app/models

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  ml_models:
